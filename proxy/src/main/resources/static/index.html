<!DOCTYPE html>
<html>
<head>
    <title>Math Services</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <h1>Form with Fibonacci con ventana</h1>

    <form>
        <label for="fibonacciValue">Número:</label><br>
        <input type="text" id="fibonacciValue" value="5"><br><br>
        <input type="button" value="Calcular" onclick="calcularfibonacci()">
    </form>
    <div id="fibonacciResult"></div>

    <hr>

    <script>
    function calcularfibonacci() {
        let value = document.getElementById("fibonacciValue").value;
        const xhttp = new XMLHttpRequest();
        xhttp.onload = function() {
            document.getElementById("fibonacciResult").innerHTML = this.responseText;
        }
        xhttp.open("GET", "/fibwin?value=" + value);
        xhttp.send();
    }

    </script>

</body>
</html>
